name: Deploy to ECS

on:
  push:
    branches: [ "main" ]   # triggers on push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-south-1 \
          | docker login --username AWS \
            --password-stdin 363318436640.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build and push Docker image
        run: |
          docker build -t roygenai/roybot:latest .
          docker tag roygenai/roybot:latest 363318436640.dkr.ecr.ap-south-1.amazonaws.com/roygenai/roybot:latest
          docker push 363318436640.dkr.ecr.ap-south-1.amazonaws.com/roygenai/roybot:latest

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster roybot-cluster \
            --service roybot-service-gpu \
            --force-new-deployment
