name: Deploy to ECS Fargate

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} |
          docker login --username AWS --password-stdin 363318436640.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build and push Docker image
        run: |
          docker build -t roygenai/roybot:latest .
          docker tag roygenai/roybot:latest 363318436640.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/roygenai/roybot:latest
          docker push 363318436640.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/roygenai/roybot:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster roybot-cluster \
            --service roybot-service-fargate \
            --force-new-deployment
